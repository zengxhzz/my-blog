notes:

  - date: "2026-06-24"
    text: |
      明明应该去做点什么的，但是什么都没做。
      真的是行动的矮子，瞧不起自己。
      明明每次考试最软脚的就是自己，但是只要自己大概可以过线就不想努力了。
      然后像小丑一样输掉。
      顺带一提，这煞笔舍友还是一如既往，我真的感觉我哪天控制不住自己。

  - date: "2026-06-22"
    text: |
     Niko夺冠了，我从未敢想过。
     just today，他有一群值得依赖的队友，他打好了每一次关键枪。
     Like the joke，but 男人一生只哭18次，最后一次是热泪盈眶。
     这十年来，我想，他一直有这个实力。但是他从未做到。
     这十年来，我想，他一直没这个心气。事实也确是如此。
     这十年来的积累，换来了这一次的冠军，不是技术而是心气。
     我一直觉得自己和Niko很像，但是。。我什么都没有。
     我和他像的地方只有我是失败者，而他或许可能曾经是。
     
  - date: "2026-06-19"
    text: |
      这舍友还是人类吗，高中也有一个叫这个名字的，有点ptsd了。
      真的是听不懂人话，打一整天游戏，吵得要死啊，死一死好不好。。。

  - date: "2026-06-18"
    text: |
      突然想起来，关于以前的记忆。
      初中以前的反而记得很清楚，上了初中后，
      对这些印象反而模糊了。
      想起那些像在看别人的故事一样，时间线有点没法串在一起。
  
  - date: "2026-06-17"
    text: |
      今天游泳课终于期末考了，学了一学期还是没学会。
      搞不懂，搞不懂呀。

  - date: "2026-06-16"
    text: |
      嘛，一般来说，还是前几天比较有新鲜感。
      不知道写这个到底能坚持多久呢。
      
  - date: "2026-06-15"
    text: |
      随笔模块上线了,以后想到什么就丢一句在这里。
      一切的起因都是有第二个舍友内裤往洗衣机里丢。。。
    
